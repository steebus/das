<html lang="en-US">
    <head>
        <style>
            body{
                margin: 0;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 16px;
                font-family: sans-serif, system-ui;
                background: #fafafa;
            }
            canvas{
                border-radius: 8px;
                box-shadow: 0 2px 12px rgba(0,0,0,0.12);
                background: #fff;
            }
            .controls{
                display: flex;
                width: 400px;
                justify-content: space-between;
            }
            button{
                padding: 8px 30px;
                border: none;
                border-radius: 4px;
                background: #333;
                color: #fff;
                font-size: 14px;
                cursor: pointer;
            }
            button:hover{
                background: #555;
            }
            label{
                font-size: 14px;
                color: #444;
                display: flex;
                align-items: center;
                gap: 8px;
            }
                input[type="range"]{
                    accent-color: #333;
        </style>
        <meta charset="utf-8">
        <title>Interactive K-Means</title>
        <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
        <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
        <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
    </head>
    <body>
        <div id="root"></div>

        <script type="text/babel">

            const RGB = [
            [220, 20, 60],    // crimson
            [70, 130, 180],   // steelblue
            [46, 139, 87],    // seagreen
            [218, 165, 32],   // goldenrod
            [186, 85, 211],   // mediumorchid
            [255, 99, 71],    // tomato
            [0, 128, 128],    // teal
            [255, 105, 180],  // hotpink
            [255, 140, 0],    // darkorange
            [106, 90, 205],   // slateblue
            ];

            const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

            // Assign function
            function assign(points, centroids){
                return points.map(p => {
                    let best = 0;
                    let bestDist = Infinity;
                    centroids.forEach((c, i) => {
                        const d = Math.hypot(p.x - c.x, p.y - c.y);
                        if (d < bestDist) {bestDist = d; best = i; }
                    });
                    return {...p, cluster: best};
                })
            }

            // Update Function
            function update(points, centroids){
                return centroids.map((c, i) => {
                    const members = points.filter(p => p.cluster === i);
                    if (members.length === 0) return c;
                    const avgX = members.reduce((sum, p) => sum + p.x, 0) / members.length;
                    const avgY = members.reduce((sum, p) => sum + p.y, 0) / members.length;
                    return {x: avgX, y: avgY};
                });
            }

            function computeSSE(points, centroids){ // calclate the sum of squared errors
                return points.reduce((sum, p) => {
                    const c = centroids[p.cluster];
                    return sum + (p.x - c.x) ** 2 + (p.y - c.y) ** 2;
                }, 0);
            }

            function runKMeansSync(points, k) {
                let centroids = kppInit(points, k); //initialize centroids using k-means++
                let assigned = assign(points, centroids); //first assignment pass

                for (let i = 0; i < 100; i++) { // run for 100 iterations
                    const moved = update(assigned, centroids);
                    const newAssigned = assign(points, moved);
                    const settled = moved.every((c, j) => c.x === centroids[j].x && c.y === centroids[j].y); // exit early
                    centroids = moved;
                    assigned = newAssigned;
                    if (settled) break;
                }

                return computeSSE(assigned,centroids);
            }

            function findElbow(results) {
                const first = results[0];
                const last = results[results.length - 1];
                const kRange = last.k - first.k;
                const sseRange = first.sse - last.sse;
                if (sseRange === 0) return first.k; //flat line

                let elbowK = first.k;
                let maxDist = -Infinity;
                for (const r of results) {
                    const kn = (r.k - first.k) / kRange
                    const ssen = (first.sse - r.sse) / sseRange;
                    const dist = ssen - kn; // distance from our straight line through the sse plot
                    
                    if (dist > maxDist) { 
                        maxDist = dist; 
                        elbowK = r.k;
                    }
                }
                return elbowK;
            }

            function kppInit(points, k) {
                const centroids = [{x: points[0].x, y: points[0].y}];
                while (centroids.length < k) {
                    const d2 = points.map(p => Math.min(...centroids.map(c=> (p.x - c.x) ** 2 + (p.y - c.y) **2)) //pick the furthest point
                    );
                    let best = 0;
                    for (let i = 1; i < d2.length; i++) if (d2[i] > d2[best]) best = i;
                    centroids.push({x: points[best].x, y: points[best].y});
                }
                return centroids.map(c=> ({x: c.x, y:c.y}));
            }


            //MAIN APP BODY
            function App(){
                const [state, setState] = React.useState({ points: [], centroids: []}); // our arrays of points and centroids
                const canvasRef = React.useRef(null);
                const elbowCanvasRef = React.useRef(null);
                const [k, setK] = React.useState(2); // setting k
                const [playing, setPlaying] = React.useState(false); // whether we're auto-playing or not
                const [elbowData, setElbowData] = React.useState([])

                // Centroid region calculation
                function drawRegions(ctx, centroids) {
                    if (centroids.length === 0) return;

                    const img = ctx.createImageData(400, 400);
                    const data = img.data;

                    for (let y = 0; y < 400; y++) {
                        for (let x = 0; x < 400; x++) {
                        // find nearest centroid to this pixel
                        let best = 0, bestDist = Infinity;
                        centroids.forEach((c, i) => {
                            const d = (x - c.x) ** 2 + (y - c.y) ** 2;   // squared distance — no sqrt needed
                            if (d < bestDist) { bestDist = d; best = i; }
                        });

                        // write that centroid's color into this pixel
                        const [r, g, b] = RGB[best];
                        const idx = (y * 400 + x) * 4;     // where this pixel lives in the flat array
                        data[idx]     = r;
                        data[idx + 1] = g;
                        data[idx + 2] = b;
                        data[idx + 3] = 40;                // alpha 0–255; 40 = faint tint
                        }
                    }
                    ctx.putImageData(img, 0, 0);           // blit the whole buffer at once
                    }
                
                // Auto-play logic
                React.useEffect(() => {
                    if (!playing) return;
                    const id = setInterval(step, 150);
                    return () => clearInterval(id);
                }, [playing]);

                // Watch Elbow Data
                  React.useEffect(() => {
                    if (elbowData.length === 0) return;
                    const ctx = elbowCanvasRef.current.getContext('2d');
                    ctx.clearRect(0, 0, 400, 150);

                    const maxSSE = Math.max(...elbowData.map(r => r.sse));
                    const pad = 24;
                    const w = 400 - pad * 2;
                    const h = 150 - pad * 2;

                    // draw line
                    ctx.beginPath();
                    ctx.strokeStyle = '#aaa';
                    ctx.lineWidth = 1.5;
                    elbowData.forEach((r, i) => {
                        const x = pad + (i / (elbowData.length - 1)) * w;
                        const y = pad + (1 - r.sse / maxSSE) * h;
                        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                    });
                    ctx.stroke();

                    // draw dots
                    elbowData.forEach((r, i) => {
                        const x = pad + (i / (elbowData.length - 1)) * w;
                        const y = pad + (1 - r.sse / maxSSE) * h;
                        ctx.beginPath();
                        ctx.arc(x, y, 4, 0, Math.PI * 2);
                        ctx.fillStyle = r.k === k ? '#e00' : '#333';
                        ctx.fill();
                    });
                }, [elbowData]);

                // DRAW THE POINTS AND CENTROIDS
                React.useEffect(() => {
                const ctx = canvasRef.current.getContext('2d');
                ctx.clearRect(0, 0, 400, 400);

                drawRegions(ctx, state.centroids);
                
                for (const p of state.points) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
                    ctx.fillStyle = p.cluster == null ? '#bbb' : `rgb(${RGB[p.cluster].join(', ')})`;
                    ctx.fill();
                }
                }, [state]);


                React.useEffect(() => {
                    setState(prev => { 
                        if (prev.centroids.length === 0 && prev.points.length >= k) {
                            return {...prev, centroids: kppInit(prev.points, k)
                            };
                        }
                        return prev;
                    });
                }, [state.points, k]);

                async function findOptimalK(){
                    if (state.points.length < 2) return;

                    const results = [];

                    for (let ki = 1; ki <=10; ki++) {
                        setK(ki);
                        await sleep(200);
                        const sse = runKMeansSync(state.points, ki);
                        results.push({k: ki, sse});
                    }
                
                    const optimal = findElbow(results);
                    setK(optimal);
                    setElbowData(results);
                }

                function handleClick(event) { // click logic
                    const rect = canvasRef.current.getBoundingClientRect();
                    const x = event.clientX - rect.left;
                    const y = event.clientY - rect.top;
                    setState(prev => ({...prev, points: [...prev.points, {x, y, cluster: null}],
                    }));
                }

                React.useEffect(() => {
                    setState(prev => ({
                        centroids: [],
                        points: prev.points.map(p => ({...p, cluster: null})),
                    }));
                    }, [k]);

                function step(){
                    setState(prev => {
                        if (prev.centroids.length === 0) return prev;
                        const assigned = assign(prev.points, prev.centroids);
                        const moved = update(assigned, prev.centroids);
                        return {points: assigned, centroids: moved};
                    });
                }

                return(
                    <div style={{display: 'flex', flexDirection: 'column', gap: '16px'}}>
                        <h1>Interactive K-Means</h1>
                        <div style={{display: 'flex', alignItems: 'flex-start',gap: '16px'}}>
                            <canvas //our main canvas
                                ref={canvasRef} 
                                width={400} 
                                height={400} 
                                onClick={handleClick}
                            />
                            <div style={{width: 300, color: '#808080'}}>
                                <small> 
                                    The K-means algorithm is an unsupervised machine learning model.
                                    It does it best to create groups for items based on their properties.
                                    
                                    The 'k' refers to the number of groups the algorithm is allowed to create.
                                </small>  
                            </div>
                                
                            
                        </div>
                        <div style={{display: 'flex', width: '400px'}}>
                                k = {k}
                                <input
                                    style={{flex: 1}}
                                    type="range"
                                    min={1}
                                    max={10}
                                    value={k}
                                    onChange={e => setK(Number(e.target.value))}
                                />
                                <button onClick={findOptimalK}>Find K</button>
                        </div>
                        <div style={{display: 'flex', justifyContent: 'space-evenly',width: '400px'}}>

                            <button onClick={step}>Step</button>

                            <button onClick={() => setPlaying(p => !p)}>
                                {playing ? 'Pause' : 'Play'}
                            </button>


                            <button onClick={() => {setState({points: [], centroids: []}); setElbowData([]); setK(2); setPlaying(false);}} >Reset</button>
                        </div>
                        {elbowData.length > 0 && (
                            <div style={{textAlign: 'center'}}>
                            <small style={{color: '#888'}}>SSE by k - elbow at  k={k}</small>
                            <canvas ref={elbowCanvasRef} width={400} height={150}/>
                            </div>
                        )}
                    </div>
                );
            }

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        </script>
    </body>
</html>
