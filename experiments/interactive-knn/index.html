<html lang="en-US">
    <head>
        <meta charset="utf-8">
        <title>Interactive KNN</title>
        <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
        <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
        <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
    </head>
    <body>
        <div id="root"></div>

        <script type="text/babel">

            function classify(query, points, k){ //knn algorithm
                const withDist = points.map(p => ({
                    label: p.label,
                    dist: Math.hypot(p.x - query.x, p.y - query.y) //draw a straight line from the query dot to each point
                    }));

                    withDist.sort((a, b) => a.dist - b.dist); //sort the points by this distance

                    const nearest = withDist.slice(0, k); // take the first k

                    const votesFor1 = nearest.filter(n => n.label === 1).length; // count how many of the first k are 1
                    
                    return votesFor1 > k /2 ? 1 :0; //compare that to half the total k
            }

            function App(){
                const canvasRef = React.useRef(null);

                const [points] = React.useState([
                    {x: 100, y:150, label: 0},
                    {x: 120, y: 180, label: 0},
                    {x: 300, y: 250, label: 1},
                    {x: 280, y: 300, label: 1},
                ]);

                React.useEffect(() => {
                    const canvas = canvasRef.current;
                    const ctx = canvas.getContext('2d');

                    ctx.clearRect(0, 0, canvas.width, canvas.height);

                    for (const p of points) {
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
                        ctx.fillStyle = p.label === 0 ? 'crimson' : 'steelblue';
                        ctx.fill()
                    }

                }, [points]);

                return <canvas ref={canvasRef} width={400} height={400} style={{border: '1px solid #ccc'}}/>;
            }

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        </script>
    </body>
</html>
